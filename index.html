<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Robot Chatbot - Real-time voice interaction powered by AI">
    <title>Robot Chatbot</title>
    <link rel="preload" href="/static/style.css" as="style">
    <link rel="preload" href="/static/app.js" as="script">
    <link rel="preload" href="/static/sm.png" as="image">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"></noscript>
</head>
<body>
    <button id="fullscreenBtn" aria-label="Toggle fullscreen mode">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2d3436" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
    </button>

    <div class="container">
        <main>
            <div class="logo-container">
                <img src="/static/h.png" alt="Logo" class="logo">
            </div>

            <div class="visualizer-container" role="img" aria-label="Audio visualizer">
                <canvas id="visualizer" aria-hidden="true"></canvas>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
    <script>
        // ====== Image Display System ======
        let imageTimer = null;
        let lastImageUrl = null;

        const overlay = document.createElement('div');
        overlay.id = 'imageOverlay';
        Object.assign(overlay.style, {
            display: 'none',
            position: 'fixed',
            top: '0', left: '0',
            width: '100vw', height: '100vh',
            backgroundColor: 'rgba(0,0,0,0.85)',
            zIndex: '9999',
            justifyContent: 'center',
            alignItems: 'center',
            flexDirection: 'column'
        });

        const img = document.createElement('img');
        Object.assign(img.style, {
            maxWidth: '90vw',
            maxHeight: '85vh',
            borderRadius: '16px',
            boxShadow: '0 8px 40px rgba(0,0,0,0.6)',
            objectFit: 'contain'
        });

        const progressBar = document.createElement('div');
        Object.assign(progressBar.style, {
            marginTop: '20px',
            width: '300px',
            height: '6px',
            backgroundColor: 'rgba(255,255,255,0.2)',
            borderRadius: '3px',
            overflow: 'hidden'
        });

        const progressFill = document.createElement('div');
        Object.assign(progressFill.style, {
            height: '100%',
            width: '100%',
            backgroundColor: '#ffffff',
            borderRadius: '3px',
            transition: 'width 15s linear'
        });

        progressBar.appendChild(progressFill);
        overlay.appendChild(img);
        overlay.appendChild(progressBar);
        document.body.appendChild(overlay);

        function showImage(url) {
            if (imageTimer) clearTimeout(imageTimer);
            img.src = url;
            overlay.style.display = 'flex';
            // Animate progress bar
            progressFill.style.transition = 'none';
            progressFill.style.width = '100%';
            setTimeout(() => {
                progressFill.style.transition = 'width 15s linear';
                progressFill.style.width = '0%';
            }, 50);
            imageTimer = setTimeout(() => {
                overlay.style.display = 'none';
                lastImageUrl = null;
            }, 15000);
        }

        // Poll server every 2 seconds for new image commands
        async function pollImage() {
            try {
                const res = await fetch('/admin/current-image');
                const data = await res.json();
                if (data.url && data.url !== lastImageUrl) {
                    lastImageUrl = data.url;
                    showImage(data.url);
                }
            } catch (e) {}
        }

        setInterval(pollImage, 2000);
    </script>
</body>
</html>
